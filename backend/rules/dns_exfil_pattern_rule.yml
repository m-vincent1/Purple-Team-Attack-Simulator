id: dns_exfil_pattern_rule
name: DNS Tunneling / Exfiltration Pattern
description: Detects DNS queries with base64-encoded subdomains indicating potential data exfiltration via DNS tunneling.
severity: high
enabled: true
mitre:
  tactic: Exfiltration
  technique_id: T1048
  technique_name: Exfiltration Over Alternative Protocol
logsource:
  source: dns_logs
  event_type: dns_query
detection:
  condition: all
  fields:
    event_type:
      equals: dns_query
    raw_message:
      contains:
        - "dGVzdGRhdGFleGZpbA=="
false_positives:
  - Legitimate DNS-based CDN queries with long hostnames
  - DNS service providers with long TXT records
recommendation: Deploy DNS monitoring solutions. Block known DNS tunneling tools and monitor for high-volume DNS query anomalies.
